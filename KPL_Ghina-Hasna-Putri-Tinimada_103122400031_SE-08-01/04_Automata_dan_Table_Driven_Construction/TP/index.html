<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pengubah Gaya Teks</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Pengkonversi Gaya Teks</h2>
<p>Alat ini bisa dipakai untuk mengubah teks jadi huruf besar atau huruf kecil.</p>

<label>Masukkan teks:</label><br>
<textarea id="editor-besar"></textarea>

<p>Hasil:</p>
<textarea id="editor-kecil" readonly></textarea>

<div class="button-area">
<button id="btn-besar">Besarkan</button>
<button id="btn-kecil">Kecilkan</button>
</div>

<div class="button-area">
<button id="mode-terang">Mode Terang</button>
<button id="mode-gelap">Mode Gelap</button>
</div>

<script src="script.js"></script>

</body>
</html>
