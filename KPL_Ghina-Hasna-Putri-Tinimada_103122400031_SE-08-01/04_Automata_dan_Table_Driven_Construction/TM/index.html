<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengkonversi Gaya Teks</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="light-mode">

<div class="container">
    <h1>Pengkonversi Gaya Teks</h1>
    <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

    <label>Masukkan teks:</label>
    <textarea id="textInput" placeholder="Kata-kata..."></textarea>

    <p id="count">Huruf: 0, huruf besar: 0 huruf kecil: 0</p>

    <button onclick="toUpper()">Besarkan</button>
    <button onclick="toLower()">Kecilkan</button>

    <div class="mode-div">
        <button onclick="setMode('light')">Mode Terang</button>
        <button onclick="setMode('dark')">Mode Gelap</button>
        <button onclick="setMode('sepia')">Mode Sepia</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
